<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#111;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
    width:90%;
    max-width:500px;
}

.card{
    background:#222;
    border-radius:20px;
    padding:20px;
    cursor:pointer;
    transition:0.3s;
}

.card img{
    width:100%;
    border-radius:15px;
    max-height:400px;
    object-fit:cover;
}

.answer{
    display:none;
    margin-top:20px;
    font-size:24px;
}

button{
    margin-top:20px;
    padding:15px 30px;
    border:none;
    border-radius:10px;
    background:white;
    color:black;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="card" onclick="showAnswer()">
    <img id="cardImage" src="">
    <div class="answer" id="answer"></div>
</div>

<button onclick="nextCard()">Carte suivante</button>

</div>

<script>

const cards = [
    
{
image:"1.png",
answer:"Branchement avec coeur à pointe mobile"
}

{
image:"aiguille de deraillement a droite .png",
answer:"aiguille de deraillement a droite"
}

{
image:"aiguille de deraillement a gauche.png",
answer:"aiguille de deraillement a gauche"
}

{
image:"branchement.png",
answer:"branchemente"
}

{
image:"pont mobile.png",
answer:"pont mobile"
}
    
{
image:"traverse d ecartement.png",
answer:"traverse d ecartement"
}

{
image:"traverse jonction double.png",
answer:"traverse jonction double"
}

{
image:"traverse jonction simple.png",
answer:"traverse jonction simple"
}

{
image:"traverse ordinaire a aiguilles.png",
answer:"traverse ordinaire a aiguilles"
}

{
image:"traverse ordinaire.png",
answer:"traverse ordinaire"
}
    
];

let currentCard;

function nextCard(){

document.getElementById("answer").style.display="none";

currentCard = cards[Math.floor(Math.random()*cards.length)];

document.getElementById("cardImage").src = currentCard.image;

document.getElementById("answer").innerText = currentCard.answer;

}

function showAnswer(){
document.getElementById("answer").style.display="block";
}

nextCard();

</script>

</body>
</html>
