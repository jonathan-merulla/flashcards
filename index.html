<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#111;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    text-align:center;
    width:90%;
    max-width:500px;
}

.card{
    background:#222;
    border-radius:20px;
    padding:20px;
    cursor:pointer;
    transition:0.3s;
}

.card img{
    width:100%;
    border-radius:15px;
    max-height:400px;
    object-fit:cover;
}

.answer{
    display:none;
    margin-top:20px;
    font-size:24px;
}

button{
    margin-top:20px;
    padding:15px 30px;
    border:none;
    border-radius:10px;
    background:white;
    color:black;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="card" onclick="showAnswer()">
    <img id="cardImage" src="">
    <div class="answer" id="answer"></div>
</div>

<button onclick="nextCard()">Carte suivante</button>

</div>

<script>

const cards = [
    
{
image:"1.png",
answer:"branchement avec coeur à pointe mobile"
},

{
image:"2.png",
answer:"aiguille de deraillement a droite"
},

{
image:"3.png",
answer:"aiguille de deraillement a gauche"
},

{
image:"4.png",
answer:"branchement"
},

{
image:"5.png",
answer:"pont mobile"
},
    
{
image:"6.png",
answer:"traverse d ecartement"
},

{
image:"7.png",
answer:"traverse jonction double"
},

{
image:"8.png",
answer:"traverse jonction simple"
},

{
image:"9.png",
answer:"traverse ordinaire a aiguilles"
},

{
image:"10.png",
answer:"traverse ordinaire"
}

{
image:"11.png",
answer:"extremite d un cv sauf jade et tcm100 et cvc"
},

{
image:"12.png",
answer:"extremite d un cv a joint electrique"
},

{
image:"13.png",
answer:"zone de detection pour circuit de voie court"
},

{
image:"14.png",
answer:"contact de rail avec detection de sens et detection de passage"
},

{
image:"15.png",
answer:"point de detection et point de detection avec fonction pedale"
},
    
{
image:"16.png",

},

{

},

{

},

{

},

{
image:"20.png",
answer:"tous les appareils de voie sont liberes, seul le dernier ne peut etre parcourus"
}
    
];

let currentCard;

function nextCard(){

document.getElementById("answer").style.display="none";

currentCard = cards[Math.floor(Math.random()*cards.length)];

document.getElementById("cardImage").src = currentCard.image;

document.getElementById("answer").innerText = currentCard.answer;

}

function showAnswer(){
document.getElementById("answer").style.display="block";
}

nextCard();

</script>

</body>
</html>
